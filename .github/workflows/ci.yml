name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: food_user
          POSTGRES_PASSWORD: food_pass
          POSTGRES_DB: food_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest --verbosity=1
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: food_db
          DB_USER: food_user
          DB_PASSWORD: food_pass
          SECRET_KEY: ci-test-secret-key
          DEBUG: "False"

  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chez_mama
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
