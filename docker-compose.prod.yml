# Production VPS stack — use with docs/DEPLOY_VPS.md
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-food_db}
      POSTGRES_USER: ${DB_USER:-food_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - internal

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb -p local/$${AWS_STORAGE_BUCKET_NAME:-food-media} || true;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-food-media}
    networks:
      - internal

  django:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      AWS_S3_ENDPOINT_URL: http://minio:9000
      SOCKET_EMIT_URL: http://socket:3001/internal/emit
      RUN_MIGRATIONS: "true"
      DEBUG: "False"
    expose:
      - "8000"
    depends_on:
      - postgres
      - redis
      - minio-init
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - internal

  socket:
    build:
      context: ./socket-gateway
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/1
      JWT_SECRET: ${SECRET_KEY}
      SOCKET_INTERNAL_SECRET: ${SOCKET_INTERNAL_SECRET:?set SOCKET_INTERNAL_SECRET}
      CORS_ORIGIN: ${CORS_ALLOWED_ORIGINS:-*}
    expose:
      - "3001"
    depends_on:
      - redis
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - django
      - socket
    networks:
      - internal

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  certbot_www:
  certbot_certs:

networks:
  internal:
    driver: bridge
