# Local development stack: Postgres, Redis, MinIO, Django API, Socket.io gateway.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: food_db
      POSTGRES_USER: food_user
      POSTGRES_PASSWORD: food_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U food_user -d food_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Pas de port 6379 sur l'hôte (souvent déjà pris par Redis local).
    # Les autres services utilisent redis:6379 sur le réseau Docker.
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb -p local/food-media || true;
      mc anonymous set download local/food-media || true;
      exit 0;
      "

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      SOCKET_EMIT_URL: http://socket:3001/internal/emit
      SOCKET_INTERNAL_SECRET: socket-internal-dev
      RUN_MIGRATIONS: "true"
      SEED_CATEGORIES: "true"
      SERVE_MEDIA: "true"
      USE_S3: "False"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - django_media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  socket:
    build:
      context: ./socket-gateway
    environment:
      PORT: "3001"
      REDIS_URL: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET:-django-insecure-change-me-in-production-please-0a2el3fc}
      SOCKET_INTERNAL_SECRET: socket-internal-dev
      CORS_ORIGIN: "*"
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy

  # Notifications météo toutes les 5 h (jus de fruit si chaud, foutou si froid, etc.)
  weather-cron:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      WEATHER_NUDGE_INTERVAL_SECONDS: "18000"
    command: >
      sh -c "while true; do
        python manage.py send_weather_nudges;
        sleep $${WEATHER_NUDGE_INTERVAL_SECONDS:-18000};
      done"
    depends_on:
      django:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  django_media:
